<!DOCTYPE html>
<html lang="portuguese">

    <head>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>TRANSFORBOT - ChatBot TESTE</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <div class="app-shell">
            <aside class="side-menu">
                <img class= "logo-vivo" src="vivo-119.png" alt="Logo">
                <!--<div class="brand">VIVO</div>-->  

                <nav>

                    <a href="#chat">
                        <i class="bi bi-chat-dots"></i> 
                        <span>Abertura de demanda</span> <!--span deixa os elementos inline-->
                    </a>

                    <a href="#problema">
                        <i class="bi bi-exclamation-diamond"></i>
                        <span>Relatar problema</span>
                    </a>

                    <nav>
                    
                    <div class="perfil-area"> 
                        <a href="#perfil">
                            <i class="bi bi-person"></i>
                            <span>Perfil</span>
                        </a>
                    </div>
                </nav>
                
                </nav>
                    
            </aside>
            
            <main class="main-content">

           
                    <div class="chat-header">

                        <div class="chat-title">
                            <i class="bi bi-robot"></i>
                            <span class="titulo_chat">TRANSFORBOT</span>
                        </div>

                        </div>
                    <div class="chat-window">
                        <div class="message bot">
                            <span class="message-label">TRANSFORBOT</span>
                            <p>Hello! How can I help you today?</p>
                        </div>
                        <div class="message user">
                            <span class="message-label">You</span>
                            <p>I need support with my service.</p>
                        </div>
                        <div class="message bot">
                            <span class="message-label">TRANSFORBOT</span>
                            <p>Sure! Please tell me what issue you're facing.</p>
                        </div>
                    </div>
                    <form class="chat-input-area">
                        <input type="text" placeholder="Digite sua mensagem...">
                        <button type="submit"><i class="bi bi-send-fill"></i></button>
                    </form>
                </section>
            </main>
        </div>
    </body>
</html>
