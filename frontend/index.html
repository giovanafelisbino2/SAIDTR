<!DOCTYPE html>
<html lang="portuguese">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>SAIDTR - ChatBot</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <div class="app-shell">
            <aside class="side-menu">
                <div class="brand">VIVO</div>
                <nav>
                    <a href="#Chat">Chat</a>
                    <a href="#Relatar problema">Home</a>
                </nav>
            </aside>
            
            <main class="main-content">
                <section class="chat-panel" id="chat">
                    <div class="chat-header">
                        <div>
                            <h2>Chat</h2>
                        </div>
                    </div>
                    <div class="chat-window">
                        <div class="message bot">
                            <span class="message-label">SAIDTR</span>
                            <p>Hello! How can I help you today?</p>
                        </div>
                        <div class="message user">
                            <span class="message-label">You</span>
                            <p>I need support with my service.</p>
                        </div>
                        <div class="message bot">
                            <span class="message-label">SAIDTR</span>
                            <p>Sure! Please tell me what issue you're facing.</p>
                        </div>
                    </div>
                    <form class="chat-input-area">
                        <input type="text" placeholder="Type your message...">
                        <button type="submit">Send</button>
                    </form>
                </section>
            </main>
        </div>
    </body>
</html>
