<!DOCTYPE html>
<html lang="portuguese">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>SAIDTR - ChatBot TESTE</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <div class="app-shell">
            <aside class="side-menu">
                <img class= "logo-vivo" src="vivo-119.png" alt="Logo">
                <!--<div class="brand">VIVO</div>-->                
                <nav>
                    <a href="#chat">Chat</a>
                    <a href="#problema">Relatar problema</a>
                    <a href="#perfil">Perfil</a
                </nav>
            </aside>
            
            <main class="main-content">

           
                    <div class="chat-header">
                        <div>
                            <h2 class="titulo_chat">SAIDTR</h2>
                        </div>
                    </div>
                    <div class="chat-window">
                        <div class="message bot">
                            <span class="message-label">SAIDTR</span>
                            <p>Hello! How can I help you today?</p>
                        </div>
                        <div class="message user">
                            <span class="message-label">You</span>
                            <p>I need support with my service.</p>
                        </div>
                        <div class="message bot">
                            <span class="message-label">SAIDTR</span>
                            <p>Sure! Please tell me what issue you're facing.</p>
                        </div>
                    </div>
                    <form class="chat-input-area">
                        <input type="text" placeholder="Digite sua mensagem...">
                        <button type="submit">📤</button>
                    </form>
                </section>
            </main>
        </div>
    </body>
</html>
